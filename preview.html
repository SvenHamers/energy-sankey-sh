<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Radial Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #b0bec5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 24px;
    }
    .card-wrapper {
      background: #16213e;
      border-radius: 16px;
      width: 100%;
      max-width: 800px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    h1 { font-size: 16px; font-weight: 400; padding: 8px 16px 0; color: #cfd8dc; }
    h2 { font-size: 13px; font-weight: 300; color: #78909c; text-align: center; }
  </style>
</head>
<body>
  <h2>90% Solar — lines should look AMBER/YELLOW</h2>
  <div class="card-wrapper">
    <h1>Sunny day</h1>
    <elec-radial id="r1"></elec-radial>
  </div>

  <h2>90% Grid — lines should look BLUE</h2>
  <div class="card-wrapper">
    <h1>Night time grid</h1>
    <elec-radial id="r2"></elec-radial>
  </div>

  <h2>60% Battery + 20% Grid + 20% Solar — blended</h2>
  <div class="card-wrapper">
    <h1>Mixed sources</h1>
    <elec-radial id="r3"></elec-radial>
  </div>

  <script type="module">
    import './dist/energy-sankey.js';

    function setup(id, solar, grid, battIn, soc, consumers) {
      const el = document.getElementById(id);
      el.unit = 'W';
      if (solar > 0) {
        el.generationInRoutes = { 's': { id: 's', text: 'Solar', rate: solar } };
      } else {
        el.generationInRoutes = { 's': { id: 's', text: 'Solar', rate: 0 } };
      }
      el.gridInRoute = { id: 'g', text: 'Grid', rate: grid };
      if (battIn > 0) {
        el.batteryRoutes = { 'b': { in: { id: 'b', text: 'Battery', rate: battIn }, out: { id: 'bo', text: 'Battery', rate: 0 } } };
      } else {
        el.batteryRoutes = {};
      }
      el.batterySoc = soc;
      el.consumerRoutes = consumers;
      el.maxConsumerBranches = 0;
      el.hideConsumersBelow = 0;
    }

    const cons = {
      'c1': { id: 'c1', text: 'TV', rate: 200 },
      'c2': { id: 'c2', text: 'Airco', rate: 80 },
      'c3': { id: 'c3', text: 'Verlichting', rate: 40 },
    };

    // 90% solar, 10% grid
    setup('r1', 900, 100, 0, undefined, cons);

    // 90% grid, 10% solar
    setup('r2', 50, 950, 0, undefined, cons);

    // Mixed: 60% battery, 20% grid, 20% solar
    setup('r3', 200, 200, 600, 72, cons);
  </script>
</body>
</html>
